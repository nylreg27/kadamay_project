{% extends 'base.html' %}
{% block content %}
<h2 class="text-2xl font-bold mb-4 text-red-600">Delete Profile</h2>

<p>Are you sure you want to delete profile <strong>{{ profile }}</strong>?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger mt-4">Yes, Delete</button>
  <a href="{% url 'profile_detail' profile.id %}" class="btn btn-secondary ml-2">Cancel</a>
</form>
{% endblock %}
